test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

amazon:
  service: S3
  endpoint: <%= ENV.fetch("DO_SPACES_ENDPOINT", "https://sgp1.digitaloceanspaces.com") %>
  access_key_id: <%= ENV.fetch("DO_SPACES_KEY", "") %>
  secret_access_key: <%= ENV.fetch("DO_SPACES_SECRET", "") %>
  region: <%= ENV.fetch("DO_SPACES_REGION", "sgp1") %>
  bucket: <%= ENV.fetch("DO_SPACES_BUCKET", "minimeshop-bucket") %>
  # NOTE: Do NOT set public: true here — it adds x-amz-acl and signs
  # content-md5 in the presigned PUT URL, which DigitalOcean Spaces rejects
  # because the browser XHR upload doesn't send Content-MD5.
  # Public read access is handled by the bucket policy instead.

cloudflare:
  service: S3
  endpoint: <%= ENV.fetch("CLOUDFLARE_ENDPOINT", "") %>
  access_key_id: <%= ENV.fetch("CLOUDFLARE_ACCESS_KEY_ID", "") %>
  secret_access_key: <%= ENV.fetch("CLOUDFLARE_SECRET_ACCESS_KEY", "") %>
  region: auto
  bucket: <%= ENV.fetch("CLOUDFLARE_BUCKET", "spree-#{Rails.env}") %>
  force_path_style: true
  request_checksum_calculation: "when_required"
  response_checksum_validation: "when_required"
